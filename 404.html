<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found | HJ Landscaping &amp; Construction</title>
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14110F;--bone:#F7F3EB;--leaf-bright:#7BC94A;--fg2:#B8AE9F;}
  *{box-sizing:border-box;}html,body{margin:0;}
  body{background:var(--ink);color:var(--bone);font-family:"Manrope",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .eyebrow{font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:0.22em;font-size:12px;color:var(--fg2);font-weight:500;display:inline-flex;align-items:center;gap:12px;margin-bottom:28px;}
  .eyebrow::before{content:"";width:28px;height:1px;background:var(--leaf-bright);display:inline-block;}
  h1{font-family:"Oswald",sans-serif;font-size:clamp(56px,12vw,140px);font-weight:700;text-transform:uppercase;letter-spacing:-0.03em;line-height:0.9;margin:0;}
  h1 span{color:var(--leaf-bright);}
  p{font-size:20px;color:var(--fg2);max-width:46ch;margin:28px auto 40px;line-height:1.5;}
  .row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  a.btn{font-weight:600;font-size:15px;padding:16px 28px;border-radius:2px;text-decoration:none;display:inline-flex;align-items:center;gap:10px;}
  a.solid{background:var(--bone);color:var(--ink);}
  a.solid .arrow{color:#4FA12B;}
  a.ghost{background:transparent;color:var(--bone);border:1px solid var(--bone);}
  a.ghost:hover{background:var(--bone);color:var(--ink);}
</style>
</head>
<body>
<main>
  <div class="eyebrow">Error 404</div>
  <h1>Off the<br><span>map.</span></h1>
  <p>That page doesn't exist — but the crew's still on site. Head back home or get in touch.</p>
  <div class="row">
    <a class="btn solid" href="/">Back to home <span class="arrow">→</span></a>
    <a class="btn ghost" href="/contact/">Contact us</a>
  </div>
</main>
</body>
</html>
